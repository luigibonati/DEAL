data:
  files: ["traj.xyz"]     # can be a single file or a list of files
  format: "extxyz"        # file format (e.g. extxyz, xyz, ...)
  index: ":"              # frame selection (e.g. ":", "0:100", [0,10,20]) [see ASE notation]
  shuffle: false          # whether to shuffle the frames before processing (suggested true for MD data)
  seed: 42

# Optional in-memory preselection from a per-atom uncertainty array:
# preprocessing:
#   key: force_std_comp_max
#   mask_key: deal_mask
#   plot: true              # true, false, or a filename
#   output: traj_preprocessed.xyz # optional reusable masked trajectory
#   overwrite: false        # do not replace an existing file by default
# Omit mask_threshold to use automatic frame thresholds (1.1x and 4x mean maximum)
# and a per-frame atom threshold of 0.3x that frame's maximum.

deal:
  threshold: 0.1          #can be a single value or a list of values
  
  # OR alternative:
  # max_selected: 50       # incremental mode: mutually exclusive with `threshold`
  # max_iterations: 10     # max iterations for incremental mode
  # threshold_factor: 0.75 # threshold_i = threshold_factor**(i+1)

  update_threshold: none  # if not set it is chosen as 0.8 * threshold 
  max_atoms_added: -1    # limit the number of selected environments added per configuration (can be int (number of atoms) float (0,1) (fraction of total atoms), or -1 (no limit)
  mask: true              # false = all atoms; true = deal_mask; or use another per-atom mask name
  initial_atoms: none     # specify which atoms to use for GP initialization (list, fraction or number. Default: none, 1 atom per species)
  output_prefix: deal     # prefix for output files (threshold will be appended as suffix)
  force_only: true
  train_hyps: false       # whether to re-train hyperparameters at each iteration (slower) 
  verbose: true           # allowed values: true/false/"debug" (default: true)
  save_gp: false
  save_full_trajectory: false 

sgp:
  gp: SGP_Wrapper
  kernels:
    - name: NormalizedDotProduct
      sigma: 2 
      power: 2
  descriptors:
    - name: B2
      nmax: 8
      lmax: 3
      cutoff_function: cosine
      radial_basis: chebyshev
  cutoff: 4.5
  # species:                    # by default they are parsed from the traj file
    # - 1
    # - 6
    # - 8
    # - 29
